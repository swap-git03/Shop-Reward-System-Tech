<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<h2>Customers List</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Points</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
    </tr>
    {% endfor %}
</table>
