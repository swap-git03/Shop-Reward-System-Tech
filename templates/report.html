<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">


<h2>Purchase Report</h2>

<table border="1">
    <tr>
        <th>Purchase ID</th>
        <th>Customer Name</th>
        <th>Amount</th>
        <th>Points</th>
        <th>Date</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/">Back to Home</a>
